name: Build C Program

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile
      run: gcc -Wall -Wextra -o currency_converter currency_converter.c
    
    - name: Test compilation
      run: |
        ./currency_converter << EOF
        1
        100
        0
        EOF
