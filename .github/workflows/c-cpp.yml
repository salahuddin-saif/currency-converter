name: C/C++ CI with Detailed Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile program
      run: gcc -o currency_converter currency_converter.c
    
    - name: Test invalid choice
      run: |
        echo "Testing invalid choice input..."
        echo "Sending input: 99 (invalid) then 0 (exit)"
        echo "------------------------"
        
        # Run program with invalid choice
        OUTPUT=$(echo -e "99\n0\n" | ./currency_converter)
        echo "$OUTPUT"
        
        echo "------------------------"
        
        # Check if output contains "Invalid choice"
        if echo "$OUTPUT" | grep -q "Invalid choice"; then
          echo "✅ SUCCESS: Program correctly identified invalid choice"
          echo "   Expected message: 'Invalid choice! Try again.'"
          echo "   Found in output: Yes"
        else
          echo "❌ FAILURE: Program did not display 'Invalid choice' message"
          echo "   Expected message: 'Invalid choice! Try again.'"
          echo "   Found in output: No"
          exit 1
        fi
        
        echo ""
        echo "Testing multiple invalid choices..."
        OUTPUT=$(echo -e "99\n100\n0\n" | ./currency_converter)
        if echo "$OUTPUT" | grep -q "Invalid choice"; then
          echo "✅ SUCCESS: Program handled multiple invalid choices"
        fi
    
    - name: Test all valid conversions
      run: |
        echo "============================="
        echo "Testing all valid conversions"
        echo "============================="
        
        # Test array of conversions
        declare -a tests=(
          "1|100|10800.00|USD to BDT"
          "2|1080|10.00|BDT to USD"
          "3|100|95.00|USD to EUR"
          "4|100|8509.00|AUD to BDT"
          "5|1000|12.00|BDT to AUD"
        )
        
        for test in "${tests[@]}"; do
          IFS='|' read -r choice amount expected name <<< "$test"
          echo ""
          echo "Testing: $name"
          echo "Input: choice=$choice, amount=$amount"
          
          OUTPUT=$(echo -e "$choice\n$amount\n0\n" | ./currency_converter)
          
          if echo "$OUTPUT" | grep -q "$expected"; then
            echo "✅ PASS: $name - Result contains $expected"
          else
            echo "❌ FAIL: $name - Expected '$expected' not found in output"
            echo "Program output:"
            echo "$OUTPUT"
            exit 1
          fi
        done
        
        echo ""
        echo "============================="
        echo "✅ All conversion tests passed!"
        echo "============================="
